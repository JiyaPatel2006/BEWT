<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        a=parseInt(prompt('enter number 1:'));
        b=parseInt(prompt('enter number 2:'));
        c=prompt('enter +,-,*,/,%');
        var res;
        switch(c){
            case '+': res=a+b; break;
            case '-': res=a-b; break;
            case '*': res=a*b; break;
            case '/': res=a/b; break;
            case '%': res=a%b; break;

        }
       console.log(res);



    </script>
</body>
</html>
