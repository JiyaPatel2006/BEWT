<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n=parseInt(prompt('enter no'));
        a=0;
        b=1;
        for(i=1;i<=n;i++){
            document.write(a);
            temp=a+b;
            a=b;
            b=temp;
        }
    </script>
</body>
</html>
