<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("Enter number of rows"));

        for (let i = 1; i <= n; i++) {

            for (let j = 0; j < n - i; j++) {
                document.write("&nbsp;");
            }
            for (let k = 1; k <= (2 * i - 1); k++) {
                
                if (k == 1 || k == (2 * i - 1) || i == n) {
                    document.write("*");
                } else {
                    document.write("&nbsp;");
                }
            }

            document.write("<br>");
        }
    </script>
</body>
</html>
