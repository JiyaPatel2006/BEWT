<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
          n=parseInt(prompt('enter no to check armstrong or not'));
        rem=0;
        sum=0;
        temp=n;
        t=n;
        count=0;
        while(n!=0){
            rem=n%10;
            n=parseInt(n/10);
            count++;
        }
        while(temp>0){
            rem=temp%10;
            sum+=Math.pow(rem,count);
            temp=parseInt(temp/10);
        }
        if(sum==t){
            document.write("armstrong");
        }
        else{
            document.write("not armstrong");
        }

    </script>
</body>
</html>
