<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n=parseInt(prompt('enter no to check palimdrom or not'));
        rem=0;
        sum=0;
        temp=n;
        while(n!=0){
            rem=n%10;
            sum=sum*10+rem;
            n=parseInt(n/10);
        }
        if(temp==sum){
            document.write("palimdrom");
        }
        else{
            document.write("not palimdrom");
        }
    </script>
</body>
</html>
