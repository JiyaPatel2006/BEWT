<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function sum(a,b,callback){
            res=a+b;
            callback(res);
        }
        function print(ans){
            document.write("sum="+ans);
        }
        sum(5,3,print);
    </script>
</body>
</html>
