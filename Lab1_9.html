<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Pattern</title>
</head>
<body>
    <script>
        const n = parseInt(prompt('Enter number:'));

        for (let i = 0; i < n; i++) {
            for (let j = 0; j <n-i; j++) {
               document.write("  ");

            }
            for (let k = 0; k <=i; k++) {
                document.write("* ");
            }

            document.write("<br>");
        }
    
    </script>
</body>
</html>
