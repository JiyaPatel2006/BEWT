<body>
    <script>
        class student{
            constructor(name,rollno,sem){
                this.name=name;
                this.rollno=rollno;
                this.sem=sem;
            }
            display(){
            document.write("name:"+this.name+"<br> rollno:"+this.rollno+"<br> sem:"+this.sem);
        }
    }
        
        const abc =new student('jiya',413,4);
        abc.display();

    </script>
</body>
