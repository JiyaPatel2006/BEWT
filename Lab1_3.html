<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        a=parseInt(prompt('enter no'));
        fact=1;
        for(i=1;i<=a;i++){
            fact=fact*i;
        }
        document.write(fact);
    </script>
